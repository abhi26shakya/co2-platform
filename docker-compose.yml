# Local development stack: `docker compose up --build`
# Frontend runs OUTSIDE compose during dev (npm run dev) for fast HMR;
# a frontend service is included for full-stack integration testing.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: co2
      POSTGRES_PASSWORD: co2password
      POSTGRES_DB: co2_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U co2 -d co2_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CO2_DATABASE_URL: postgresql+asyncpg://co2:co2password@postgres:5432/co2_platform
      CO2_ML_SERVICE_URL: http://ml-service:8001
      CO2_INFERENCE_BACKEND: http
      CO2_CORS_ORIGINS: '["http://localhost:3000"]'
      CO2_JWT_SECRET_KEY: dev-only-secret-change-in-prod
    command: sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    profiles: ["full"]   # opt-in: docker compose --profile full up

volumes:
  pgdata:
  backend_storage:
